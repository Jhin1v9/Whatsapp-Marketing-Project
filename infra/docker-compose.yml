version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: saas_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: saas_api
    env_file:
      - ../.env.example
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: saas_web
    env_file:
      - ../.env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
